version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: runhub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - runhub_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - runhub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: runhub-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      GOOGLE_DRIVE_API_KEY: ${GOOGLE_DRIVE_API_KEY}
      STITCH_API_KEY: ${STITCH_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-https://api.openai.com/v1/chat/completions}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - runhub-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: runhub-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - runhub-network

volumes:
  runhub_postgres_data:

networks:
  runhub-network:
    driver: bridge
