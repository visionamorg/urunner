server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/runhub
    username: runhub
    password: runhub123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  task:
    execution:
      pool:
        max-size: 10
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}
  oauth:
    strava:
      client-id: ${STRAVA_CLIENT_ID}
      client-secret: ${STRAVA_CLIENT_SECRET}
      redirect-uri: ${APP_BASE_URL:http://localhost:8080}/api/oauth/strava/callback
    garmin:
      consumer-key: ${GARMIN_CONSUMER_KEY}
      consumer-secret: ${GARMIN_CONSUMER_SECRET}
      redirect-uri: ${APP_BASE_URL:http://localhost:8080}/api/oauth/garmin/callback
      webhook-secret: ${GARMIN_WEBHOOK_SECRET:}
    frontend-callback-url: ${FRONTEND_URL:http://localhost:4200}/oauth/callback
  drive:
    api-key: ${GOOGLE_DRIVE_API_KEY:}
  ai:
    stitch-api-key: ${STITCH_API_KEY:}
    api-url: ${AI_API_URL:https://api.openai.com/v1/chat/completions}
    model: ${AI_MODEL:gpt-4o-mini}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  mail:
    from: ${MAIL_FROM:noreply@runhub.com}
    from-name: ${MAIL_FROM_NAME:RunHub}

logging:
  level:
    com.runhub: INFO
    org.springframework.security: WARN
